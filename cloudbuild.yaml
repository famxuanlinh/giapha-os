steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/giapha-repo/giapha-os:v1',
      '--build-arg', 'NEXT_PUBLIC_SUPABASE_URL=${_SUPABASE_URL}',
      '--build-arg', 'NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${_SUPABASE_KEY}',
      '--build-arg', 'SITE_NAME=${_SITE_NAME}',
      '.'
    ]

images:
  - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/giapha-repo/giapha-os:v1'

substitutions:
  _SUPABASE_URL: ''
  _SUPABASE_KEY: ''
  _SITE_NAME: ''

options:
  logging: CLOUD_LOGGING_ONLY
